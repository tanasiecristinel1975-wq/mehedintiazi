name: Genereaza Articole din Decap CMS

on:
  push:
    branches: [main]
    paths:
      - '_stiri/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    # Evita bucla infinita: sare peste commit-urile proprii
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaleaza dependinte
        run: pip install pyyaml markdown

      - name: Ruleaza generatorul de articole
        run: python _stiri-generator.py

      - name: Commit si push articolele generate
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] Articole generate automat din Decap CMS"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          file_pattern: "*.html index.html"
