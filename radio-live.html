    body { background: #0a1628; min-height: 100vh; margin: 0; }
    .radio-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2240 100%);
    }
    .radio-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .radio-logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .radio-name {
      color: #f0c040;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .radio-tagline {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #c0392b;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #c0392b;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
      color: #fff;
      box-shadow: 0 8px 25px rgba(192,57,43,0.5);
      transition: all 0.2s;
    }
    .play-btn:hover { transform: scale(1.08); }
    .play-btn.playing { background: #27ae60; box-shadow: 0 8px 25px rgba(39,174,96,0.5); }
    .radio-status {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 25px;
      min-height: 20px;
    }
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .volume-wrap span { color: rgba(255,255,255,0.5); font-size:18px; }
    input[type=range] {
      -webkit-appearance: none;
      width: 150px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #f0c040;
      border-radius: 50%;
      cursor: pointer;
    }
    .radio-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .radio-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.2s;
    }
    .radio-link:hover { background: rgba(255,255,255,0.15); color:#fff; }
    .back-site {
      margin-top: 30px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    .back-site a { color: #f0c040; text-decoration: none; }
    @media(max-width:480px) {
      .radio-card { padding: 30px 20px; }
      .radio-name { font-size: 22px; }
    }

<body>

<div class="radio-page">
  <div class="radio-card">

    <img src="img/radio-logo.png" alt="Radio MehedintiAzi" class="radio-logo" />

    <div class="radio-name">Radio MehedintiAzi</div>
    <div class="radio-tagline">Muzica si stiri din judetul Mehedinti</div>

    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE 24/7
    </div>

    <br>

    <button class="play-btn" id="play-btn" onclick="toggleRadio()">&#9654;</button>

    <div class="radio-status" id="radio-status">Apasa Play pentru a asculta</div>

    <div class="volume-wrap">
      <span>&#128264;</span>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)" />
      <span>&#128266;</span>
    </div>

    <div class="radio-links">
      <a href="https://www.facebook.com/profile.php?id=61588136442785" target="_blank" class="radio-link">
        &#128100; Facebook
      </a>
      <a href="https://www.mehedintiazi.ro" class="radio-link">
        &#127968; Site
      </a>
      <a href="https://wa.me/?text=Asculta+Radio+MehedintiAzi+LIVE+https://www.mehedintiazi.ro/radio-live" target="_blank" class="radio-link">
        &#128241; Trimite
      </a>
    </div>

    <div class="back-site">
      &copy; 2026 <a href="https://www.mehedintiazi.ro">MehedintiAzi.ro</a>
    </div>

  </div>
</div>

<audio id="radio-audio" preload="none">
  <source src="https://radio.mehedintiazi.ro/radio" type="audio/mpeg" />
</audio>

<script>
var audio = document.getElementById('radio-audio');
var btn = document.getElementById('play-btn');
var status = document.getElementById('radio-status');
var vol = document.getElementById('volume');
audio.volume = 0.8;

function toggleRadio() {
  if (audio.paused) {
    audio.load();
    audio.play();
    btn.innerHTML = '&#9646;&#9646;';
    btn.classList.add('playing');
    status.textContent = '&#127925; Live acum pe Radio MehedintiAzi...';
  } else {
    audio.pause();
    audio.src = '';
    btn.innerHTML = '&#9654;';
    btn.classList.remove('playing');
    status.textContent = 'Apasa Play pentru a asculta';
  }
}

function setVolume(v) {
  audio.volume = v;
}
</script>

</body>
